services:
  vera-db-mvp:
    image: postgres:16-alpine
    container_name: vera-db-mvp
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MVP_DB_DATABASE:-vera_mvp}
      POSTGRES_USER: ${MVP_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${MVP_DB_PASSWORD:-change-me}
    ports:
      - "${MVP_DB_PORT:-54329}:5432"
    volumes:
      - vera_db_mvp_data:/var/lib/postgresql/data
      - ./database/mvp/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  vera_db_mvp_data:
